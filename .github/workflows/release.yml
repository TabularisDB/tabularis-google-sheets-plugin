name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ui:
    name: ui-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build UI
        run: pnpm --dir ui build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

  build:
    name: ${{ matrix.platform-label }}
    needs: ui
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform-label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: zip
            binary-suffix: ""
          - platform-label: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: zip
            binary-suffix: ""
            cross: true
          - platform-label: darwin-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            archive: zip
            binary-suffix: ""
          - platform-label: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: zip
            binary-suffix: ""
          - platform-label: win-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary-suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux-arm64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          STAGE=staging/google-sheets
          mkdir -p "$STAGE/ui/dist"
          cp target/${{ matrix.target }}/release/google-sheets-plugin${{ matrix.binary-suffix }} "$STAGE/"
          cp manifest.json "$STAGE/"
          cp ui/dist/*.js "$STAGE/ui/dist/"
          (cd staging && zip -r ../google-sheets-plugin-${{ matrix.platform-label }}.zip google-sheets)

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "staging\google-sheets"
          New-Item -ItemType Directory -Force -Path "$stage\ui\dist" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\google-sheets-plugin${{ matrix.binary-suffix }}" $stage
          Copy-Item "manifest.json" $stage
          Copy-Item "ui\dist\*.js" "$stage\ui\dist\"
          Compress-Archive -Path $stage -DestinationPath "google-sheets-plugin-${{ matrix.platform-label }}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: google-sheets-plugin-${{ matrix.platform-label }}.zip
